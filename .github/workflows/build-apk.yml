name: Build MYRA APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Fix Android Directory Structure
      run: |
        mkdir -p app/src/main/java/com/myra/assistant
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/layout

        # مینی فیسٹ فائل کا درست ڈھانچہ
        cat <<EOF > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.myra.assistant">
            <application
                android:allowBackup="true"
                android:label="MYRA"
                android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # تھیم اور اسٹائل کی فائل
        cat <<EOF > app/src/main/res/values/styles.xml
        <resources>
            <style name="Theme.AppCompat.Light.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar" />
        </resources>
        EOF

        # مین جاوا فائل (سینٹیکس بالکل درست کر دیا گیا ہے)
        cat <<EOF > app/src/main/java/com/myra/assistant/MainActivity.java
        package com.myra.assistant;
        import android.os.Bundle;
        import androidx.appcompat.app.AppCompatActivity;

        public class MainActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
            }
        }
        EOF

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.4
        cache-disabled: true

    - name: Build APK with Gradle
      run: |
        chmod +x gradlew
        ./gradlew clean
        ./gradlew assembleDebug --no-daemon --stacktrace
      env:
        JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: MYRA-Final-APK
        path: "**/build/outputs/apk/debug/*.apk"
