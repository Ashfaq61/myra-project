name: Build MYRA APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Accept Android SDK Licenses
      run: |
        mkdir -p ${ANDROID_HOME}/licenses
        echo -e "\n896414b4b1e74d00b9d5e763162d2d866124d0d1" > ${ANDROID_HOME}/licenses/android-sdk-license
        echo -e "\n24333f1a63b682509d31d0ef9841ee10d0757a02" > ${ANDROID_HOME}/licenses/android-sdk-preview-license

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.4

    - name: Clean and Build APK
      run: |
        chmod +x gradlew
        ./gradlew clean
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: MYRA-Fixed-APK
        path: "**/build/outputs/apk/debug/*.apk"
