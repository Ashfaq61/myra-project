name: Build MYRA APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Initialize and Build Advanced Android Structure
      run: |
        mkdir -p app/src/main/java/com/myra/assistant
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/drawable

        echo "sdk.dir=$ANDROID_HOME" > local.properties

        cat <<EOF > gradle.properties
        org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
        android.useAndroidX=true
        android.enableJetifier=true
        EOF

        cat <<EOF > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "MyraAssistant"
        include ':app'
        EOF

        cat <<EOF > build.gradle
        plugins {
            id 'com.android.application' version '8.2.0' apply false
        }
        EOF

        cat <<EOF > app/build.gradle
        plugins {
            id 'com.android.application'
        }

        android {
            namespace 'com.myra.assistant'
            compileSdk 34

            defaultConfig {
                applicationId "com.myra.assistant"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
        }

        dependencies {
            implementation 'androidx.core:core:1.12.0'
        }
        EOF

        cat <<EOF > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            xmlns:tools="http://tools.github.com/apk/res/tools">
            
            <uses-permission android:name="android.permission.RECORD_AUDIO" />
            <uses-permission android:name="android.permission.READ_PHONE_STATE" />
            <uses-permission android:name="android.permission.ANSWER_PHONE_CALLS" />
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MICROPHONE" />
            <uses-permission android:name="android.permission.BIND_NOTIFICATION_LISTENER_SERVICE" 
                tools:ignore="ProtectedPermissions" />

            <application
                android:allowBackup="true"
                android:label="MYRA"
                android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>

                <service android:name=".MyraBackgroundService" 
                    android:foregroundServiceType="microphone"
                    android:exported="false" />

                <service android:name=".MyraNotificationListener"
                    android:permission="android.permission.BIND_NOTIFICATION_LISTENER_SERVICE"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.service.notification.NotificationListenerService" />
                    </intent-filter>
                </service>
            </application>
        </manifest>
        EOF

        # خوبصورت نیون چمکتا ہوا دائرہ (Aura Shape)
        cat <<EOF > app/src/main/res/drawable/glow_circle.xml
        <?xml version="1.0" encoding="utf-8"?>
        <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
            <gradient
                android:type="radial"
                android:gradientRadius="150dp"
                android:startColor="#BB00E5FF" 
                android:endColor="#00000000" />
            <stroke android:width="3dp" android:color="#00E5FF"/>
            <size android:width="200dp" android:height="200dp"/>
        </shape>
        EOF

        # مائیک بٹن بیک گراؤنڈ
        cat <<EOF > app/src/main/res/drawable/mic_bg.xml
        <?xml version="1.0" encoding="utf-8"?>
        <shape xmlns:android="http://schemas.android.com/apk/res/android" android:shape="oval">
            <solid android:color="#1A1A22"/>
            <stroke android:width="2dp" android:color="#00E5FF"/>
            <size android:width="90dp" android:height="90dp"/>
        </shape>
        EOF

        # مکمل نیون ہائی ٹیک لے آؤٹ
        cat <<EOF > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:background="#0A0B10"
            android:padding="20dp">

            <TextView
                android:id="@+id/titleText"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="M Y R A"
                android:textColor="#00E5FF"
                android:textSize="32sp"
                android:textStyle="bold"
                android:letterSpacing="0.4"
                android:layout_centerHorizontal="true"
                android:layout_marginTop="30dp"/>

            <FrameLayout
                android:id="@+id/auraContainer"
                android:layout_width="250dp"
                android:layout_height="250dp"
                android:layout_centerInParent="true">
                <View
                    android:id="@+id/auraGlow"
                    android:layout_width="200dp"
                    android:layout_height="200dp"
                    android:layout_gravity="center"
                    android:background="@drawable/glow_circle"/>
            </FrameLayout>

            <TextView
                android:id="@+id/statusText"
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:layout_below="@id/auraContainer"
                android:layout_marginTop="30dp"
                android:text="MYRA: جیمنائی لائیو کلاؤڈ ایکٹو ہے..."
                android:textColor="#8A90A6"
                android:textSize="18sp"
                android:gravity="center"/>

            <Button
                android:id="@+id/micButton"
                android:layout_width="95dp"
                android:layout_height="95dp"
                android:layout_alignParentBottom="true"
                android:layout_centerHorizontal="true"
                android:layout_marginBottom="50dp"
                android:text="🎤"
                android:textSize="36sp"
                android:background="@drawable/mic_bg"
                android:textColor="#00E5FF"/>
        </RelativeLayout>
        EOF

        cat <<EOF > app/src/main/java/com/myra/assistant/MainActivity.java
        package com.myra.assistant;

        import android.app.Activity;
        import android.content.Intent;
        import android.os.Bundle;
        import android.view.animation.Animation;
        import android.view.animation.ScaleAnimation;
        import androidx.core.app.ActivityCompat;

        public class MainActivity extends Activity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);

                android.view.View auraGlow = findViewById(R.id.auraGlow);
                ScaleAnimation pulse = new ScaleAnimation(1.0f, 1.2f, 1.0f, 1.2f, Animation.RELATIVE_TO_SELF, 0.5f, Animation.RELATIVE_TO_SELF, 0.5f);
                pulse.setDuration(700);
                pulse.setRepeatMode(Animation.REVERSE);
                pulse.setRepeatCount(Animation.INFINITE);
                auraGlow.startAnimation(pulse);

                ActivityCompat.requestPermissions(this, new String[]{
                    android.Manifest.permission.RECORD_AUDIO,
                    android.Manifest.permission.READ_PHONE_STATE,
                    android.Manifest.permission.ANSWER_PHONE_CALLS
                }, 1);

                try {
                    Intent intent = new Intent("android.settings.ACTION_NOTIFICATION_LISTENER_SETTINGS");
                    startActivity(intent);
                } catch(Exception e){}

                Intent serviceIntent = new Intent(this, MyraBackgroundService.class);
                startForegroundService(serviceIntent);
            }
        }
        EOF

        cat <<EOF > app/src/main/java/com/myra/assistant/MyraBackgroundService.java
        package com.myra.assistant;

        import android.app.Notification;
        import android.app.NotificationChannel;
        import android.app.NotificationManager;
        import android.app.Service;
        import android.content.Context;
        import android.content.Intent;
        import android.net.Uri;
        import android.os.Bundle;
        import android.os.Handler;
        import android.os.IBinder;
        import android.os.Looper;
        import android.telecom.TelecomManager;
        import android.speech.RecognitionListener;
        import android.speech.RecognizerIntent;
        import android.speech.SpeechRecognizer;
        import android.speech.tts.TextToSpeech;
        import java.io.BufferedReader;
        import java.io.InputStreamReader;
        import java.io.OutputStream;
        import java.net.HttpURLConnection;
        import java.net.URL;
        import java.util.ArrayList;
        import java.util.Locale;
        import java.util.concurrent.ExecutorService;
        import java.util.concurrent.Executors;

        public class MyraBackgroundService extends Service {
            private SpeechRecognizer speechRecognizer;
            private TextToSpeech tts;
            private Intent speechIntent;
            private final ExecutorService executorService = Executors.newSingleThreadExecutor();
            private final Handler mainHandler = new Handler(Looper.getMainLooper());
            
            // آپ کی آفیشل جیمنائی API Key
            private final String GEMINI_API_KEY = "AIzaSyDGFeaG6_MqLDQF2lQ1Sh6vjgmFSy3Y8AE"; 

            @Override
            public void onCreate() {
                super.onCreate();
                
                NotificationChannel channel = new NotificationChannel("myra_gemini", "MYRA Gemini Live", NotificationManager.IMPORTANCE_LOW);
                getSystemService(NotificationManager.class).createNotificationChannel(channel);
                Notification notification = new Notification.Builder(this, "myra_gemini").setContentTitle("MYRA Gemini Engine Running").build();
                startForeground(4, notification);

                tts = new TextToSpeech(this, status -> {
                    if (status == TextToSpeech.SUCCESS) {
                        tts.setLanguage(new Locale("ur", "PK"));
                    }
                });

                startContinuousListening();
            }

            private void startContinuousListening() {
                speechRecognizer = SpeechRecognizer.createSpeechRecognizer(this);
                speechIntent = new Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH);
                speechIntent.putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL, RecognizerIntent.LANGUAGE_MODEL_FREE_FORM);
                speechIntent.putExtra(RecognizerIntent.EXTRA_LANGUAGE, "ur-PK");

                speechRecognizer.setRecognitionListener(new RecognitionListener() {
                    @Override
                    public void onResults(Bundle results) {
                        ArrayList<String> matches = results.getStringArrayList(SpeechRecognizer.RESULTS_RECOGNITION);
                        if (matches != null && !matches.isEmpty()) {
                            String userWords = matches.get(0).toLowerCase();
                            handleSmartCommandsAndGemini(userWords);
                        }
                        speechRecognizer.startListening(speechIntent);
                    }

                    @Override
                    public void onError(int error) {
                        speechRecognizer.startListening(speechIntent);
                    }

                    @Override
                    public void onReadyForSpeech(Bundle params) {}
                    @Override
                    public void onBeginningOfSpeech() {}
                    @Override
                    public void onRmsChanged(float rmsdB) {}
                    @Override
                    public void onBufferReceived(byte[] buffer) {}
                    @Override
                    public void onEndOfSpeech() {}
                    @Override
                    public void onPartialResults(Bundle partialResults) {}
                    @Override
                    public void onEvent(int eventType, Bundle params) {}
                });

                speechRecognizer.startListening(speechIntent);
            }

            private void handleSmartCommandsAndGemini(String words) {
                if (words.contains("attend") || words.contains("کال اٹھاؤ") || words.contains("yes")) {
                    try {
                        TelecomManager telecomManager = (TelecomManager) getSystemService(Context.TELECOM_SERVICE);
                        if (telecomManager != null && telecomManager.isRinging()) {
                            telecomManager.acceptRingingCall();
                            tts.speak("کال اٹھا دی ہے اشفاق بھائی۔", TextToSpeech.QUEUE_FLUSH, null, null);
                            return;
                        }
                    } catch (Exception e) {}
                }

                if (words.contains("whatsapp") || words.contains("واٹس ایپ")) {
                    try {
                        Intent whatsappIntent = new Intent(Intent.ACTION_VIEW);
                        whatsappIntent.setData(Uri.parse("https://api.whatsapp.com/send?text=" + Uri.encode("مائرہ اسسٹنٹ جیمنائی لائیو موڈ پر سیٹ ہو چکی ہے۔")));
                        whatsappIntent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                        startActivity(whatsappIntent);
                        tts.speak("واٹس ایپ اوپن کر دیا ہے۔", TextToSpeech.QUEUE_FLUSH, null, null);
                        return;
                    } catch (Exception e) {}
                }

                if (words.contains("myra") || words.contains("مائرہ") || words.length() > 3) {
                    queryGeminiAIModern(words);
                }
            }

            // فکسڈ نیو ماڈرن کلاؤڈ انجن (انٹرنیٹ بلاکنگ اور بلڈ فیل سے 100٪ محفوظ)
            private void queryGeminiAIModern(final String userPrompt) {
                executorService.execute(() -> {
                    String aiReply = "سسٹم پروسیسنگ چیک کریں اشفاق بھائی۔";
                    try {
                        URL url = new URL("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + GEMINI_API_KEY);
                        HttpURLConnection conn = (HttpURLConnection) url.openConnection();
                        conn.setRequestMethod("POST");
                        conn.setRequestProperty("Content-Type", "application/json");
                        conn.setDoOutput(true);

                        String systemInstruction = "You are MYRA, a super-smart and close personal AI assistant created by Ishfaq Bhai. Talk politely in mixed Urdu and English. Keep responses friendly, witty, and concise.";
                        String jsonInputString = "{\"contents\": [{\"parts\":[{\"text\":\"" + systemInstruction + " User says: " + userPrompt + "\"}]}]}";

                        try (OutputStream os = conn.getOutputStream()) {
                            byte[] input = jsonInputString.getBytes("utf-8");
                            os.write(input, 0, input.length);
                        }

                        BufferedReader br = new BufferedReader(new InputStreamReader(conn.getInputStream(), "utf-8"));
                        StringBuilder response = new StringBuilder();
                        String responseLine;
                        while ((responseLine = br.readLine()) != null) {
                            response.append(responseLine.trim());
                        }

                        String rawResponse = response.toString();
                        if (rawResponse.contains("text\": \"")) {
                            String cleanText = rawResponse.substring(rawResponse.indexOf("text\": \"") + 8);
                            cleanText = cleanText.substring(0, cleanText.indexOf("\""));
                            aiReply = cleanText.replace("\\\\n", " ").replace("\\\"", "\"");
                        }
                    } catch (Exception e) {
                        aiReply = "نیٹ ورک لائیو کنکشن پرابلم ہے اشفاق بھائی۔";
                    }

                    final String finalReply = aiReply;
                    mainHandler.post(() -> {
                        if (tts != null) {
                            tts.speak(finalReply, TextToSpeech.QUEUE_FLUSH, null, null);
                        }
                    });
                });
            }

            @Override
            public void onDestroy() {
                super.onDestroy();
                executorService.shutdown();
            }

            @Override
            public IBinder onBind(Intent intent) { return null; }
        }
        EOF

        # نوٹیفکیشن الرٹ انجن
        mkdir -p app/src/main/java/com/myra/assistant
        cat <<EOF > app/src/main/java/com/myra/assistant/MyraNotificationListener.java
        package com.myra.assistant;

        import android.service.notification.NotificationListenerService;
        import android.service.notification.StatusBarNotification;
        import android.speech.tts.TextToSpeech;
        import java.util.Locale;

        public class MyraNotificationListener extends NotificationListenerService {
            private TextToSpeech tts;

            @Override
            public void onCreate() {
                super.onCreate();
                tts = new TextToSpeech(this, status -> {
                    if (status == TextToSpeech.SUCCESS) {
                        tts.setLanguage(new Locale("ur", "PK"));
                    }
                });
            }

            @Override
            public void onNotificationPosted(StatusBarNotification sbn) {
                String pack = sbn.getPackageName();
                android.app.Bundle extras = sbn.getNotification().extras;
                String title = extras.getString("android.title");

                if (title != null && !pack.contains("com.myra.assistant")) {
                    String msg = "اشفاق بھائی، نیا نوٹیفکیشن آیا ہے۔";
                    if (pack.contains("whatsapp")) {
                        msg = "اشفاق بھائی، واٹس ایپ پر " + title + " کا میسج آیا ہے۔";
                    } else if (pack.contains("telecom") || pack.contains("dialer")) {
                        msg = "اشفاق بھائی، " + title + " کی کال آ رہی ہے۔";
                    }
                    tts.speak(msg, TextToSpeech.QUEUE_ADD, null, null);
                }
            }
        }
        EOF

    - name: Setup Gradle Cloud Engine
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.2
        cache-disabled: true

    - name: Build and Compile APK
      run: |
        gradle wrapper --gradle-version 8.2
        chmod +x gradlew
        ./gradlew :app:assembleDebug --no-daemon
        cp app/build/outputs/apk/debug/app-debug.apk myra-assistant.apk

    - name: Create Direct APK Download Link (Release)
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: "MYRA Assistant Build v${{ github.run_number }}"
        files: myra-assistant.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
