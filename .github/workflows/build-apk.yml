name: Build MYRA APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Initialize and Build Perfect Android Structure
      run: |
        # فولڈرز کی درست بناوٹ
        mkdir -p app/src/main/java/com/myra/assistant
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/layout

        # 1. لوکل ایس ڈی کے پاتھ کی فائل
        echo "sdk.dir=$ANDROID_HOME" > local.properties

        # 2. گریڈل کی پراپرٹیز فائل
        cat <<EOF > gradle.properties
        org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
        android.useAndroidX=true
        android.enableJetifier=true
        EOF

        # 3. روٹ لیول کی settings.gradle
        cat <<EOF > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "MyraAssistant"
        include ':app'
        EOF

        # 4. روٹ لیول کی build.gradle
        cat <<EOF > build.gradle
        plugins {
            id 'com.android.application' version '8.2.0' apply false
        }
        EOF

        # 5. ایپ لیول کی build.gradle
        cat <<EOF > app/build.gradle
        plugins {
            id 'com.android.application'
        }

        android {
            namespace 'com.myra.assistant'
            compileSdk 34

            defaultConfig {
                applicationId "com.myra.assistant"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
        }

        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
        }
        EOF

        # 6. مینی فیسٹ فائل
        cat <<EOF > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application
                android:allowBackup="true"
                android:label="MYRA"
                android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # 7. اسٹائل فائل
        cat <<EOF > app/src/main/res/values/styles.xml
        <resources>
            <style name="Theme.AppCompat.Light.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar"/>
        </resources>
        EOF

        # 8. بالکل درست اسکرین لے آؤٹ (ٹائپو فکسڈ)
        cat <<EOF > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:background="#121212"
            android:gravity="center">

            <TextView
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="MYRA AI ASSISTANT\n\nWelcome Ishfaq!"
                android:textColor="#FFFFFF"
                android:textSize="24sp"
                android:textStyle="bold"
                android:gravity="center"/>
        </RelativeLayout>
        EOF

        # 9. مین جاوا فائل
        cat <<EOF > app/src/main/java/com/myra/assistant/MainActivity.java
        package com.myra.assistant;
        import android.os.Bundle;
        import androidx.appcompat.app.AppCompatActivity;

        public class MainActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);
            }
        }
        EOF

    - name: Setup Gradle Cloud Engine
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.2
        cache-disabled: true

    - name: Build and Compile APK
      run: |
        gradle wrapper --gradle-version 8.2
        chmod +x gradlew
        ./gradlew :app:assembleDebug --no-daemon --stacktrace

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: MYRA-Final-APK
        path: "app/build/outputs/apk/debug/*.apk"
