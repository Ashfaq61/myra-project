name: Build MYRA APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Initialize and Build Perfect Android Structure
      run: |
        # 1. پروجیکٹ کے بنیادی روٹ فولڈرز بنانا
        mkdir -p app/src/main/java/com/myra/assistant
        mkdir -p app/src/main/res/values

        # 2. روٹ لیول کی settings.gradle بنانا
        cat <<EOF > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "MyraAssistant"
        include ':app'
        EOF

        # 3. روٹ لیول کی build.gradle بنانا
        cat <<EOF > build.gradle
        plugins {
            id 'com.android.application' version '8.2.0' apply false
            id 'com.android.library' version '8.2.0' apply false
        }
        EOF

        # 4. ایپ لیول کی build.gradle بنانا
        cat <<EOF > app/build.gradle
        plugins {
            id 'com.android.application'
        }

        android {
            namespace 'com.myra.assistant'
            compileSdk 34

            defaultConfig {
                applicationId "com.myra.assistant"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }

            buildTypes {
                release {
                    minifyEnabled false
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
        }

        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
        }
        EOF

        # 5. مینی فیسٹ فائل بنانا
        cat <<EOF > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application
                android:allowBackup="true"
                android:label="MYRA"
                android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # 6. اسٹائل فائل بنانا
        cat <<EOF > app/src/main/res/values/styles.xml
        <resources>
            <style name="Theme.AppCompat.Light.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar"/>
        </resources>
        EOF

        # 7. مین جاوا فائل بنانا
        cat <<EOF > app/src/main/java/com/myra/assistant/MainActivity.java
        package com.myra.assistant;
        import android.os.Bundle;
        import androidx.appcompat.app.AppCompatActivity;

        public class MainActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
            }
        }
        EOF

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.2
        cache-disabled: true

    - name: Build APK with Gradle
      run: |
        gradle assembleDebug --no-daemon --stacktrace

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: MYRA-Final-APK
        path: "app/build/outputs/apk/debug/*.apk"
