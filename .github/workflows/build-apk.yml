name: Build MYRA APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Initialize and Build Safe Android Structure
      run: |
        mkdir -p app/src/main/java/com/myra/assistant
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/drawable

        echo "sdk.dir=$ANDROID_HOME" > local.properties

        cat <<EOF > gradle.properties
        org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
        android.useAndroidX=true
        android.enableJetifier=true
        EOF

        cat <<EOF > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "MyraAssistant"
        include ':app'
        EOF

        cat <<EOF > build.gradle
        plugins {
            id 'com.android.application' version '8.2.0' apply false
        }
        EOF

        cat <<EOF > app/build.gradle
        plugins {
            id 'com.android.application'
        }

        android {
            namespace 'com.myra.assistant'
            compileSdk 34

            defaultConfig {
                applicationId "com.myra.assistant"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
        }

        dependencies {
            implementation 'androidx.core:core:1.12.0'
        }
        EOF

        cat <<EOF > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.RECORD_AUDIO" />
            <application
                android:allowBackup="true"
                android:label="MYRA"
                android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # Glow Effect Shape for Aura
        cat <<EOF > app/src/main/res/drawable/glow_circle.xml
        <?xml version="1.0" encoding="utf-8"?>
        <shape xmlns:android="http://schemas.android.com/apk/res/android"
            android:shape="oval">
            <solid android:color="#3300E5FF"/>
            <stroke android:width="4dp" android:color="#00E5FF"/>
            <size android:width="180dp" android:height="180dp"/>
        </shape>
        EOF

        # Mic Button Shape
        cat <<EOF > app/src/main/res/drawable/mic_bg.xml
        <?xml version="1.0" encoding="utf-8"?>
        <shape xmlns:android="http://schemas.android.com/apk/res/android"
            android:shape="oval">
            <solid android:color="#1E1E24"/>
            <stroke android:width="2dp" android:color="#00E5FF"/>
            <size android:width="80dp" android:height="80dp"/>
        </shape>
        EOF

        # Futuristic Video-like Layout
        cat <<EOF > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:background="#0A0B10"
            android:padding="20dp">

            <TextView
                android:id="@+id/titleText"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="M Y R A"
                android:textColor="#00E5FF"
                android:textSize="28sp"
                android:textStyle="bold"
                android:letterSpacing="0.3"
                android:layout_centerHorizontal="true"
                android:layout_marginTop="30dp"/>

            <FrameLayout
                android:id="@+id/auraContainer"
                android:layout_width="220dp"
                android:layout_height="220dp"
                android:layout_centerInParent="true">
                
                <View
                    android:id="@+id/auraGlow"
                    android:layout_width="180dp"
                    android:layout_height="180dp"
                    android:layout_gravity="center"
                    android:background="@drawable/glow_circle"/>
            </FrameLayout>

            <TextView
                android:id="@+id/statusText"
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:layout_below="@id/auraContainer"
                android:layout_marginTop="20dp"
                android:paddingLeft="20dp"
                android:paddingRight="20dp"
                android:text="MYRA: Assalam-o-Alaikum Ishfaq Bhai. I am listening."
                android:textColor="#8A90A6"
                android:textSize="18sp"
                android:gravity="center"
                android:lineSpacingMultiplier="1.2"/>

            <Button
                android:id="@+id/micButton"
                android:layout_width="85dp"
                android:layout_height="85dp"
                android:layout_alignParentBottom="true"
                android:layout_centerHorizontal="true"
                android:layout_marginBottom="40dp"
                android:text="🎤"
                android:textSize="32sp"
                android:background="@drawable/mic_bg"
                android:textColor="#00E5FF"/>

        </RelativeLayout>
        EOF

        cat <<EOF > app/src/main/java/com/myra/assistant/MainActivity.java
        package com.myra.assistant;

        import android.app.Activity;
        import android.content.Intent;
        import android.os.Bundle;
        import android.speech.RecognitionListener;
        import android.speech.RecognizerIntent;
        import android.speech.SpeechRecognizer;
        import android.speech.tts.TextToSpeech;
        import android.view.View;
        import android.view.animation.Animation;
        import android.view.animation.ScaleAnimation;
        import android.widget.Button;
        import android.widget.TextView;
        import java.util.ArrayList;
        import java.util.Locale;

        public class MainActivity extends Activity {

            private TextView statusText;
            private Button micButton;
            private View auraGlow;
            private SpeechRecognizer speechRecognizer;
            private TextToSpeech tts;
            private boolean isListening = false;

            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);

                statusText = findViewById(R.id.statusText);
                micButton = findViewById(R.id.micButton);
                auraGlow = findViewById(R.id.auraGlow);

                // Initialize Text to Speech Engine
                tts = new TextToSpeech(this, new TextToSpeech.OnInitListener() {
                    @Override
                    public void onInit(int status) {
                        if (status == TextToSpeech.SUCCESS) {
                            tts.setLanguage(new Locale("ur", "PK"));
                            speak("جی اشفاق بھائی، مائرہ حاضر ہے۔ فرمائیے؟");
                        }
                    }
                });

                // Setup Speech Recognition Engine
                speechRecognizer = SpeechRecognizer.createSpeechRecognizer(this);
                final Intent speechIntent = new Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH);
                speechIntent.putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL, RecognizerIntent.LANGUAGE_MODEL_FREE_FORM);
                speechIntent.putExtra(RecognizerIntent.EXTRA_LANGUAGE, "ur-PK");

                speechRecognizer.setRecognitionListener(new RecognitionListener() {
                    @Override
                    public void onReadyForSpeech(Bundle params) {
                        statusText.setText("MYRA: Listening carefully...");
                        startAuraAnimation(1.0f, 1.3f, Animation.INFINITE);
                    }

                    @Override
                    public void onBeginningOfSpeech() {}
                    
                    @Override
                    public void onRmsChanged(float rmsdB) {
                        // Dynamic wave scaling response to loudness
                        float scale = 1.0f + (rmsdB / 10.0f);
                        if(scale > 1.8f) scale = 1.8f;
                        auraGlow.setScaleX(scale);
                        auraGlow.setScaleY(scale);
                    }

                    @Override
                    public void onBufferReceived(byte[] buffer) {}
                    
                    @Override
                    public void onEndOfSpeech() {
                        isListening = false;
                        micButton.setText("🎤");
                        auraGlow.clearAnimation();
                    }

                    @Override
                    public void onError(int error) {
                        statusText.setText("MYRA: Aawaz clear nahi aayi. Dubara mic tap karein.");
                        isListening = false;
                        micButton.setText("🎤");
                        auraGlow.clearAnimation();
                    }

                    @Override
                    public void onResults(Bundle results) {
                        ArrayList<String> matches = results.getStringArrayList(SpeechRecognizer.RESULTS_RECOGNITION);
                        if (matches != null && matches.size() > 0) {
                            String userQuery = matches.get(0);
                            processCustomPrompt(userQuery);
                        }
                    }

                    @Override
                    public void onPartialResults(Bundle partialResults) {}
                    @Override
                    public void onEvent(int eventType, Bundle params) {}
                });

                micButton.setOnClickListener(new View.OnClickListener() {
                    @Override
                    public void onClick(View v) {
                        try {
                            if (!isListening) {
                                speechRecognizer.startListening(speechIntent);
                                isListening = true;
                                micButton.setText("🛑");
                            } else {
                                speechRecognizer.stopListening();
                                isListening = false;
                                micButton.setText("🎤");
                                auraGlow.clearAnimation();
                            }
                        } catch (Exception e) {
                            statusText.setText("System Error: " + e.getMessage());
                        }
                    }
                });
            }

            // Pulse Animation Logic for Futuristic Aura UI
            private void startAuraAnimation(float from, float to, int repeatCount) {
                ScaleAnimation pulse = new ScaleAnimation(
                        from, to, from, to,
                        Animation.RELATIVE_TO_SELF, 0.5f,
                        Animation.RELATIVE_TO_SELF, 0.5f
                );
                pulse.setDuration(600);
                pulse.setRepeatMode(Animation.REVERSE);
                pulse.setRepeatCount(repeatCount);
                auraGlow.startAnimation(pulse);
            }

            // Processing Prompt commands with custom responses
            private void processCustomPrompt(String command) {
                String response = "";
                String lowerCommand = command.toLowerCase();

                if (lowerCommand.contains("hello") || lowerCommand.contains("سلام")) {
                    response = "وعلیکم السلام اشفاق بھائی! فرمائیے، مائرہ حاضر ہے۔";
                } else if (lowerCommand.contains("kaun ho") || lowerCommand.contains("who are you")) {
                    response = "میں مائرhe ہوں، آپ کی پرسنل ایڈوانسڈ اے آئی اسسٹنٹ۔";
                } else if (lowerCommand.contains("theek ho") || lowerCommand.contains("how are you")) {
                    response = "الحمدللہ اشfaq بھائی، میں بالکل ٹھیک۔ آپ سنائیں؟";
                } else {
                    response = "Ji Ishfaq Bhai, maine suna: \"" + command + "\". Is feature par kaam chal raha hai.";
                }

                statusText.setText("MYRA: " + response);
                speak(response);
                
                // Animate aura while speaking response
                startAuraAnimation(1.0f, 1.2f, 4);
            }

            private void speak(String text) {
                if (tts != null) {
                    tts.speak(text, TextToSpeech.QUEUE_FLUSH, null, null);
                }
            }

            @Override
            protected void onDestroy() {
                if (speechRecognizer != null) speechRecognizer.destroy();
                if (tts != null) {
                    tts.stop();
                    tts.shutdown();
                }
                super.onDestroy();
            }
        }
        EOF

    - name: Setup Gradle Cloud Engine
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.2
        cache-disabled: true

    - name: Build and Compile APK
      run: |
        gradle wrapper --gradle-version 8.2
        chmod +x gradlew
        ./gradlew :app:assembleDebug --no-daemon
        cp app/build/outputs/apk/debug/app-debug.apk myra-assistant.apk

    - name: Create Direct APK Download Link (Release)
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: "MYRA Assistant Build v${{ github.run_number }}"
        files: myra-assistant.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
