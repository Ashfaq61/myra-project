name: Build MYRA APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Initialize and Build Safe Android Structure
      run: |
        mkdir -p app/src/main/java/com/myra/assistant
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/layout

        echo "sdk.dir=$ANDROID_HOME" > local.properties

        cat <<EOF > gradle.properties
        org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
        android.useAndroidX=true
        android.enableJetifier=true
        EOF

        cat <<EOF > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "MyraAssistant"
        include ':app'
        EOF

        cat <<EOF > build.gradle
        plugins {
            id 'com.android.application' version '8.2.0' apply false
        }
        EOF

        cat <<EOF > app/build.gradle
        plugins {
            id 'com.android.application'
        }

        android {
            namespace 'com.myra.assistant'
            compileSdk 34

            defaultConfig {
                applicationId "com.myra.assistant"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
        }

        dependencies {
            implementation 'androidx.core:core:1.12.0'
        }
        EOF

        cat <<EOF > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.RECORD_AUDIO" />
            <application
                android:allowBackup="true"
                android:label="MYRA"
                android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        cat <<EOF > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:background="#121212"
            android:padding="20dp">

            <TextView
                android:id="@+id/titleText"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:text="MYRA AI ASSISTANT"
                android:textColor="#FFFFFF"
                android:textSize="24sp"
                android:textStyle="bold"
                android:layout_centerHorizontal="true"
                android:layout_marginTop="20dp"/>

            <TextView
                android:id="@+id/statusText"
                android:layout_width="match_parent"
                android:layout_height="match_parent"
                android:layout_below="@id/titleText"
                android:layout_above="@+id/micButton"
                android:layout_marginTop="30dp"
                android:layout_marginBottom="30dp"
                android:text="MYRA: جی اشفاق بھائی، مائرہ حاضر ہے! نیچے مائیک والے بٹن پر کلک کریں اور مجھ سے بات کریں۔"
                android:textColor="#00FF00"
                android:textSize="18sp"
                android:gravity="center"
                android:scrollbars="vertical"/>

            <Button
                android:id="@+id/micButton"
                android:layout_width="120dp"
                android:layout_height="120dp"
                android:layout_alignParentBottom="true"
                android:layout_centerHorizontal="true"
                android:layout_marginBottom="40dp"
                android:text="🎤\nبولیں"
                android:textSize="18sp"
                android:textStyle="bold"
                android:textColor="#FFFFFF"
                android:background="@android:drawable/btn_default"
                android:backgroundTint="#1E88E5"/>

        </RelativeLayout>
        EOF

        cat <<EOF > app/src/main/java/com/myra/assistant/MainActivity.java
        package com.myra.assistant;

        import android.app.Activity;
        import android.content.Intent;
        import android.os.Bundle;
        import android.speech.RecognitionListener;
        import android.speech.RecognizerIntent;
        import android.speech.SpeechRecognizer;
        import android.speech.tts.TextToSpeech;
        import android.view.View;
        import android.widget.Button;
        import android.widget.TextView;
        import java.util.ArrayList;
        import java.util.Locale;

        public class MainActivity extends Activity {

            private TextView statusText;
            private Button micButton;
            private SpeechRecognizer speechRecognizer;
            private TextToSpeech tts;
            private boolean isListening = false;

            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);

                statusText = findViewById(R.id.statusText);
                micButton = findViewById(R.id.micButton);

                tts = new TextToSpeech(this, new TextToSpeech.OnInitListener() {
                    @Override
                    public void onInit(int status) {
                        if (status == TextToSpeech.SUCCESS) {
                            tts.setLanguage(new Locale("ur", "PK"));
                            speak("جی اشفاق بھائی، مائرہ ایکٹو ہو چکی ہے۔ فرمائیے، میں آپ کی کیا مدد کروں؟");
                        }
                    }
                });

                speechRecognizer = SpeechRecognizer.createSpeechRecognizer(this);
                final Intent speechIntent = new Intent(RecognizerIntent.ACTION_RECOGNIZE_SPEECH);
                speechIntent.putExtra(RecognizerIntent.EXTRA_LANGUAGE_MODEL, RecognizerIntent.LANGUAGE_MODEL_FREE_FORM);
                speechIntent.putExtra(RecognizerIntent.EXTRA_LANGUAGE, "ur-PK");
                speechIntent.putExtra(RecognizerIntent.EXTRA_SUPPORTED_LANGUAGES, "en-US");

                speechRecognizer.setRecognitionListener(new RecognitionListener() {
                    @Override
                    public void onReadyForSpeech(Bundle params) {
                        statusText.setText("MYRA: میں سن رہی ہوں، بولیں اشفاق بھائی...");
                    }

                    @Override
                    public void onBeginningOfSpeech() {}
                    @Override
                    public void onRmsChanged(float rmsdB) {}
                    @Override
                    public void onBufferReceived(byte[] buffer) {}
                    @Override
                    public void onEndOfSpeech() {
                        isListening = false;
                        micButton.setText("🎤\nبولیں");
                    }

                    @Override
                    public void onError(int error) {
                        statusText.setText("MYRA: معذرت، میں آپ کی آواز صحیح طرح سن نہیں سکی۔ دوبارہ کوشش کریں!");
                        isListening = false;
                        micButton.setText("🎤\nبولیں");
                    }

                    @Override
                    public void onResults(Bundle results) {
                        ArrayList<String> matches = results.getStringArrayList(SpeechRecognizer.RESULTS_RECOGNITION);
                        if (matches != null && matches.size() > 0) {
                            String userQuery = matches.get(0);
                            processUserCommand(userQuery);
                        }
                    }

                    @Override
                    public void onPartialResults(Bundle partialResults) {}
                    @Override
                    public void onEvent(int eventType, Bundle params) {}
                });

                micButton.setOnClickListener(new View.OnClickListener() {
                    @Override
                    public void onClick(View v) {
                        try {
                            if (!isListening) {
                                speechRecognizer.startListening(speechIntent);
                                isListening = true;
                                micButton.setText("🛑\nروکیں");
                            } else {
                                speechRecognizer.stopListening();
                                isListening = false;
                                micButton.setText("🎤\nبولیں");
                            }
                        } catch (Exception e) {
                            statusText.setText("Error: " + e.getMessage());
                        }
                    }
                });
            }

            // مائرہ کے پرامپٹ کی کسٹم لاجک اور پرسنالٹی
            private void processUserCommand(String command) {
                String response = "";
                String lowerCommand = command.toLowerCase();

                if (lowerCommand.contains("hello") || lowerCommand.contains("سلام") || lowerCommand.contains("assalam")) {
                    response = "وعلیکم السلام اشفاق بھائی! کیا حال چال ہیں آپ کے؟";
                } else if (lowerCommand.contains("kaun ho") || lowerCommand.contains("who are you") || lowerCommand.contains("نام کیا ہے")) {
                    response = "میں مائرہ ہوں، آپ کی پرسنل کسٹم اے آئی اسسٹنٹ جس کو آپ نے خود ڈیزائن کیا ہے۔";
                } else if (lowerCommand.contains("kaise ho") || lowerCommand.contains("how are you")) {
                    response = "الحمدللہ اشفاق بھائی، میں بالکل ٹھیک ٹھاک اور آپ کے احکامات بجا لانے کے لیے تیار ہوں۔";
                } else if (lowerCommand.contains("shukriya") || lowerCommand.contains("thank you")) {
                    response = "کوئی بات نہیں اشفاق بھائی، یہ تو میرا فرض ہے۔";
                } else {
                    response = "آپ نے فرمایا: \"" + command + "\"। میں اس کمانڈ پر مزید کام سیکھ رہی ہوں اور جلد ہی فلی ایکٹو ہو جاؤں گی!";
                }

                statusText.setText("آپ: " + command + "\n\nMYRA: " + response);
                speak(response);
            }

            private void speak(String text) {
                if (tts != null) {
                    tts.speak(text, TextToSpeech.QUEUE_FLUSH, null, null);
                }
            }

            @Override
            protected void onDestroy() {
                if (speechRecognizer != null) speechRecognizer.destroy();
                if (tts != null) {
                    tts.stop();
                    tts.shutdown();
                }
                super.onDestroy();
            }
        }
        EOF

    - name: Setup Gradle Cloud Engine
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.2
        cache-disabled: true

    - name: Build and Compile APK
      run: |
        gradle wrapper --gradle-version 8.2
        chmod +x gradlew
        ./gradlew :app:assembleDebug --no-daemon
        cp app/build/outputs/apk/debug/app-debug.apk myra-assistant.apk

    - name: Create Direct APK Download Link (Release)
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: "MYRA Assistant Build v${{ github.run_number }}"
        files: myra-assistant.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
